<header class="site-header">
  <div class="container">
    <nav class="site-nav" aria-label="Main navigation">
      <a href="{{ '/' | relative_url }}" class="site-logo">{{ site.title }}</a>

      <button class="nav-toggle" aria-label="Open navigation menu" aria-expanded="false" aria-controls="nav-menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <ul class="nav-links" id="nav-menu" role="list">
        <li>
          <a href="{{ '/' | relative_url }}"
             {% if page.url == '/' %}class="active" aria-current="page"{% endif %}>
            Home
          </a>
        </li>
        <li>
          <a href="{{ '/projects/' | relative_url }}"
             {% if page.url contains '/project' or page.url == '/projects/' %}class="active" aria-current="page"{% endif %}>
            Projects
          </a>
        </li>
        <li>
          <a href="{{ '/about/' | relative_url }}"
             {% if page.url == '/about/' %}class="active" aria-current="page"{% endif %}>
            About
          </a>
        </li>
      </ul>
    </nav>
  </div>
</header>
