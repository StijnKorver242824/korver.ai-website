title: "Korver.ai"
tagline: "Data Science & Machine Learning"
description: "BSc portfolio showcasing projects in computer vision, NLP, MLOps and classical machine learning."
url: "https://korver.ai"
baseurl: ""

author:
  name: "Korver"
  email: ""

github_username: ""
linkedin_url: ""

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Collections
collections:
  projects:
    output: true
    permalink: /project/:name/
  apps:
    output: true
    permalink: /app/:name/

# Default layouts
defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: ""
      type: "apps"
    values:
      layout: "app"

# Plugins (all GitHub Pages safe)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
  - node_modules/
  - .sass-cache/
