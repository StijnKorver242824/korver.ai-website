title: "Korver AI Solutions"
tagline: "Data Science & Artificial Intelligence"
description: "Portfolio Showcasing my Projects"
url: "https://korver.ai"
baseurl: ""

author:
  name: "Stijn Korver"
  email: "stijn@korver.ai"

github_username: "StijnKorver242824"
linkedin_url: "https://www.linkedin.com/in/stijnkorver/"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:path/
  apps:
    output: true
    permalink: /app/:path/

# Default layouts
defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: ""
      type: "apps"
    values:
      layout: "app"

# Plugins (all GitHub Pages safe)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
  - node_modules/
  - .sass-cache/
