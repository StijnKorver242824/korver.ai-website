title: Stijn Korver
email: stijn@korver.ai
description: Portfolio of motorsport data engineering projects
baseurl: ""
url: "https://korver.ai"

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:name/

# Build Settings
remote_theme: null
plugins:
  - jekyll-feed

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default
      lang: en
  - scope:
      path: ""
      type: projects
    values:
      lang: en
      layout: project

# Exclude from Processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
